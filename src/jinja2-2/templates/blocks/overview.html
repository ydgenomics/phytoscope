<!-- ================================================================== -->
<!-- Overview — 项目信息表单（混合模式）                                    -->
<!-- ================================================================== -->
<section class="section-container" id="section-overview">
    <h2 class="section-title">📋 1. Project Overview<button class="help-btn" onclick="showHelp('overview')" title="查看说明">?</button></h2>
    <p class="section-subtitle">项目基本信息。Python 已预填，可在浏览器中修改并自动保存到本地。</p>

    <div class="row g-3">
        <div class="col-md-4">
            <label class="form-label fw-bold">物种 Species</label>
            <input type="text" class="form-control" id="ov-species"
                   value="{{ overview.species }}" placeholder="如: Sedum plumbizincicola">
        </div>
        <div class="col-md-4">
            <label class="form-label fw-bold">组织 Tissue</label>
            <input type="text" class="form-control" id="ov-tissue"
                   value="{{ overview.tissue }}" placeholder="如: shoot">
        </div>
        <div class="col-md-4 d-flex align-items-end">
            <button class="download-btn" onclick="saveOverview()" style="margin-top:0;">
                💾 保存到本地
            </button>
            <span id="ov-save-status" class="ms-3 text-muted small"></span>
        </div>
    </div>
    <div class="mt-3">
        <label class="form-label fw-bold">项目背景 Background</label>
        <textarea class="form-control" id="ov-background" rows="4"
                  placeholder="描述实验目的、处理条件、样本来源等">{{ overview.background }}</textarea>
    </div>
    <div class="mt-2">
        <small class="text-muted">📅 报告生成日期: {{ project.date }}</small>
    </div>
</section>

<script>
function saveOverview() {
    const data = {
        species: document.getElementById('ov-species').value,
        tissue: document.getElementById('ov-tissue').value,
        background: document.getElementById('ov-background').value
    };
    localStorage.setItem('phytoscope_overview', JSON.stringify(data));
    document.getElementById('ov-save-status').textContent = '✅ 已保存';
    setTimeout(() => document.getElementById('ov-save-status').textContent = '', 2000);
}
// 页面加载时还原
(function() {
    const saved = localStorage.getItem('phytoscope_overview');
    if (saved) {
        try {
            const d = JSON.parse(saved);
            if (d.species) document.getElementById('ov-species').value = d.species;
            if (d.tissue) document.getElementById('ov-tissue').value = d.tissue;
            if (d.background) document.getElementById('ov-background').value = d.background;
        } catch(e) {}
    }
})();
</script>
